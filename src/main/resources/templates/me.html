<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">>
<head>
    <title>Profile</title>
</head>
<body>

<h2>Профиль</h2>

<a href="/users">Все пользователи</a>

<a href="/logout">Выйти</a>

</body>
</html>
