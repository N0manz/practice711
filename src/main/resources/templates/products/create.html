<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Создать товар</title>
</head>
<body>
<h1>Создать товар</h1>

<form th:action="@{/products}" th:object="${product}" method="post">
    <label>Название:</label>
    <input type="text" th:field="*{title}" required /><br>

    <label>Категория:</label>
    <input type="text" th:field="*{category}" required /><br>

    <label>Описание:</label>
    <textarea th:field="*{description}"></textarea><br>

    <label>Цена:</label>
    <input type="number" step="0.01" th:field="*{price}" required /><br>

    <button type="submit">Создать</button>
</form>

<a href="/products">Назад к списку</a>
</body>
</html>
